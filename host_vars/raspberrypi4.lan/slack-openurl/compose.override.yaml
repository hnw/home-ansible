---
services:
  slack-commander:
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/opt/stacks/slack-openurl
    working_dir: /opt/stacks/slack-openurl
    environment:
      - TZ=Asia/Tokyo
  pwopen:
    image: ghcr.io/hnw/pwopen:latest
    tmpfs:
      - /home/app/.pki:size=100M,uid=1000,gid=1000,mode=0700
      - /home/app/.cache:size=500M,uid=1000,gid=1000
      - /tmp:size=1G,mode=1777
    security_opt:
      - seccomp:./seccomp_profile.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4318
      - PWOPEN_TIMEOUT_MS=60000
      - TZ=Asia/Tokyo
    profiles:
      - manual
