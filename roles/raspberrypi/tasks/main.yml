---
- name: Configure Raspberry Pi hardware settings
  become: true
  block:
    - name: Disable Wi-Fi power save
      ansible.builtin.copy:
        dest: /etc/NetworkManager/conf.d/default-wifi-powersave-on.conf
        content: |
          [connection]
          wifi.powersave = 2
        mode: "0644"
      notify: Restart NetworkManager

    - name: Configure Systemd Watchdog
      ansible.builtin.lineinfile:
        path: /etc/systemd/system.conf
        regexp: "^#?RuntimeWatchdogSec="
        line: "RuntimeWatchdogSec=15s"
      notify: Restart systemd-daemon

    - name: Enable cgroup memory options in cmdline.txt
      ansible.builtin.replace:
        path: /boot/firmware/cmdline.txt
        regexp: "^(?!.*cgroup_enable=memory)(.*)$"
        replace: "\\1 cgroup_enable=cpuset cgroup_enable=memory cgroup_memory=1"
      notify: Reboot host

    - name: Unblock Bluetooth with rfkill
      ansible.builtin.command:
        cmd: rfkill unblock bluetooth
      changed_when: false
      when:
        - raspberrypi_enable_bluetooth | default(false)

    - name: Configure I2C in config.txt
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        regexp: "^dtparam=i2c_arm="
        line: "dtparam=i2c_arm=on"
        state: "{{ 'present' if raspberrypi_enable_i2c | default(false) else 'absent' }}"
      notify: Reboot host

    - name: Manage i2c-dev module
      ansible.builtin.lineinfile:
        path: /etc/modules
        line: "i2c-dev"
        state: "{{ 'present' if raspberrypi_enable_i2c | default(false) else 'absent' }}"
      notify: Reboot host

    - name: Flush handlers to apply boot config changes immediately
      ansible.builtin.meta: flush_handlers

- name: Mask unnecessary user services
  # noqa: command-instead-of-module
  ansible.builtin.shell:
    cmd: >-
      systemctl --user mask --now {{ services_list }} || true
  vars:
    services_list: "{{ raspberrypi_unnecessary_user_services | join(' ') }}"
  become: false
  changed_when: false
