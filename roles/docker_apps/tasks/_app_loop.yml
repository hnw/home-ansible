---
# 1. 変数の正規化
- name: "Normalize app item structure for {{ app_item.name | default(app_item) }}"
  ansible.builtin.set_fact:
    docker_apps_item: >-
      {{
        app_item if app_item is mapping
        else {'name': app_item}
      }}

# 2. パス変数の設定
- name: "Set paths for {{ docker_apps_item.name }}"
  ansible.builtin.set_fact:
    docker_apps_path: "{{ docker_apps_item.path | default('/opt/stacks/' + docker_apps_item.name) }}"
    docker_apps_host_dir: "{{ playbook_dir }}/host_vars/{{ inventory_hostname }}/{{ docker_apps_item.name }}"
    docker_apps_role_dir: "{{ role_path }}/templates/{{ docker_apps_item.template | default(docker_apps_item.name) }}"

# 3. 設定ファイルを検索
- name: "Find config files for {{ docker_apps_item.name }}"
  ansible.builtin.find:
    paths: "{{ search_paths | select('exists') }}"
    file_type: file
    hidden: true
    recurse: false
  vars:
    search_paths:
      - "{{ docker_apps_host_dir }}"
      - "{{ docker_apps_role_dir }}"
  delegate_to: localhost
  register: docker_apps_found

# 4. 設定ファイルリストの作成
- name: "Discover default config files for {{ docker_apps_item.name }}"
  ansible.builtin.set_fact:
    docker_apps_files: >-
      {{
        docker_apps_found.files
        | map(attribute='path')
        | map('basename')
        | reject('search', '~$')
        | reject('search', '\.swp$')
        | map('regex_replace', '\.j2$', '')
        | list
        | unique
      }}

- name: "Validate configuration for {{ docker_apps_item.name }}"
  vars:
    docker_apps_compose_files:
      - compose.yaml
      - compose.yml
      - docker-compose.yml
      - docker-compose.yaml
  ansible.builtin.fail:
    msg: >-
      ❌ Critical Error: No compose file was found for {{ docker_apps_item.name }}.
      Found files: {{ docker_apps_files }}.
      Please ensure one of {{ docker_apps_compose_files }} exists in 'host_vars' or 'templates' directories.
  when: (docker_apps_files | intersect(docker_apps_compose_files) | length) == 0

# 5. ディレクトリ作成
- name: "Ensure directory exists for {{ docker_apps_item.name }}"
  ansible.builtin.file:
    path: "{{ docker_apps_path }}"
    state: directory
    mode: "0755"
  become: true

# 6. 全設定ファイルのデプロイ
- name: "Deploy files for {{ docker_apps_item.name }}"
  vars:
    search_paths:
      - "{{ docker_apps_host_dir }}/{{ item }}.j2"
      - "{{ docker_apps_host_dir }}/{{ item }}"
      - "{{ docker_apps_role_dir }}/{{ item }}.j2"
      - "{{ docker_apps_role_dir }}/{{ item }}"
    is_secret: "{{ item is match('^\\.env') }}"
  ansible.builtin.template:
    src: "{{ lookup('first_found', search_paths) }}"
    dest: "{{ docker_apps_path }}/{{ item }}"
    mode: "{{ '0600' if is_secret else '0644' }}"
  diff: "{{ not is_secret }}"
  loop: "{{ docker_apps_files }}"
  become: true
  register: docker_apps_deploy_result

# 7. コンテナ起動
- name: "Ensure containers are running (up) for {{ docker_apps_item.name }}"
  community.docker.docker_compose_v2:
    project_src: "{{ docker_apps_path }}"
    state: present
    pull: missing
  when: docker_apps_item.start_service | default(true)
  become: true
  register: docker_apps_up_result

# 8. 設定ファイル変更時の再起動（Task 6で変更があり、Task7が実行されなかった時だけ実行）
- name: "Restart containers if config changed for {{ docker_apps_item.name }}"
  community.docker.docker_compose_v2:
    project_src: "{{ docker_apps_path }}"
    state: restarted
  when:
    - docker_apps_item.start_service | default(true)
    - docker_apps_deploy_result.changed
    - not docker_apps_up_result.changed
  become: true
